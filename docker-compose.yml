      - ./custom/models/ticket-reply.ts:/app/models/ticket-reply.ts:ro
      - ./custom/models/ticket-attachment.ts:/app/models/ticket-attachment.ts:ro
      - ./custom/uploads:/app/custom-uploads
      - ./custom/modules/ticket.js:/app/modules/ticket.js:ro
      - ./custom/views/tickets.ejs:/app/views/tickets.ejs:ro
      - ./custom/views/ticket_new.ejs:/app/views/ticket_new.ejs:ro
      - ./custom/views/ticket.ejs:/app/views/ticket.ejs:ro
      - ./custom/models-built/user-tag.js:/app/models-built/user-tag.js:ro
      - ./custom/models/user-tag.ts:/app/models/user-tag.ts:ro
      - ./custom/modules/_user_tag.js:/app/modules/_user_tag.js:ro
      - ./custom/modules/_user_tag_loader.js:/app/modules/_user_tag_loader.js:ro
      - ./custom/views/admin_user_tags.ejs:/app/views/admin_user_tags.ejs:ro
    env_file: env-app
    environment:
      - TZ=Asia/Shanghai
      - SYZOJ_WEB_LISTEN_HOSTNAME=0.0.0.0
      - SYZOJ_WEB_LISTEN_PORT=80
      - SYZOJ_WEB_DB_HOST=mariadb
      - SYZOJ_WEB_DB_DATABASE=syzoj
      - SYZOJ_WEB_DB_USERNAME=syzoj
      - SYZOJ_WEB_DB_PASSWORD=syzoj
  mariadb:
    image: mariadb
    restart: unless-stopped
    volumes:
      - database:/var/lib/mysql
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_ROOT_HOST=localhost
      - MYSQL_DATABASE=syzoj
      - MYSQL_USER=syzoj
      - MYSQL_PASSWORD=syzoj
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      start_period: 10s
      interval: 5s
      timeout: 30s
      retries: 5
  redis:
    image: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      start_period: 10s
      interval: 5s
      timeout: 1s
      retries: 5
  judge-daemon:
    image: menci/syzoj-judge
    restart: unless-stopped
    volumes:
      - config:/app/config
      - uploads:/app/testdata
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    env_file: env-app # For SYZOJ_WEB_SECRET_JUDGE
    environment:
      - TZ=Asia/Shanghai
      - SYZOJ_JUDGE_WEB_URL=http://web
      - SYZOJ_JUDGE_RABBITMQ_URI=amqp://rabbitmq/
      - SYZOJ_JUDGE_TESTDATA_PATH=/app/testdata/testdata # "uploads" is mounted on /app/testdata
      - SYZOJ_JUDGE_REDIS_URI=redis://redis:6379
    command: daemon
  rabbitmq:
    image: rabbitmq:3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      start_period: 10s
      interval: 5s
      timeout: 30s
      retries: 5
  judge-runner-1:
    image: menci/syzoj-judge
    restart: unless-stopped
    privileged: true
    tmpfs:
      - /tmp
    volumes:
      - config:/app/config
      - uploads:/app/testdata
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      - TZ=Asia/Shanghai
      - SYZOJ_JUDGE_RABBITMQ_URI=amqp://rabbitmq/
      - SYZOJ_JUDGE_TESTDATA_PATH=/app/testdata/testdata # "uploads" is mounted on /app/testdata
      - SYZOJ_JUDGE_REDIS_URI=redis://redis:6379
      - SYZOJ_JUDGE_RUNNER_INSTANCE=1
      - SYZOJ_JUDGE_CGROUP=judge-runner-1
    command: runner
volumes:
  config:
  uploads:
  database:
