      - ./custom/modules/announcement.js:/app/modules/announcement.js:ro
      - ./custom/views/admin_announcements.ejs:/app/views/admin_announcements.ejs:ro
      - ./custom/views/admin_announcement_edit.ejs:/app/views/admin_announcement_edit.ejs:ro
      - ./custom/models-built/private-message.js:/app/models-built/private-message.js:ro
      - ./custom/models-built/user-message-setting.js:/app/models-built/user-message-setting.js:ro
      - ./custom/models/private-message.ts:/app/models/private-message.ts:ro
