# Components:
# - SYZOJ Web
# - MariaDB
# - Redis
# - SYZOJ Judge
# - RabbitMQ
#
# Recommended for:
# - Web on self-hosted machine or VPS
# - Judge on the same host
#
# Notes:
# - MariaDB root password is empty (but root login only permitted inside container)
# - Redis and RabbitMQ persistent are not enabled
# - Only one runner is configured in this configuration, but you can copy and replace 1 to 2 to add more
services:
  web:
    image: menci/syzoj-web
    restart: unless-stopped
    ports:
      - "4567:80"
    tmpfs:
      - /app/sessions
    volumes:
      - config:/app/config
      - uploads:/app/uploads
      - ./custom/favicon.png:/app/static/self/favicon.png:ro
      - ./custom/header.ejs:/app/views/header.ejs:ro
      - ./custom/views/tags.ejs:/app/views/tags.ejs:ro
      - ./custom/modules/tags.js:/app/modules/tags.js:ro
      - ./custom/models/problem-solution.ts:/app/models/problem-solution.ts:ro
      - ./custom/models-built/problem-solution.js:/app/models-built/problem-solution.js:ro
      - ./custom/modules/solution.js:/app/modules/solution.js:ro
      - ./custom/views/solutions.ejs:/app/views/solutions.ejs:ro
      - ./custom/views/solution.ejs:/app/views/solution.ejs:ro
      - ./custom/views/solution_edit.ejs:/app/views/solution_edit.ejs:ro
      - ./custom/views/problem.ejs:/app/views/problem.ejs:ro
      - ./custom/views/admin_solutions.ejs:/app/views/admin_solutions.ejs:ro
      - ./custom/modules/_user_privilege_loader.js:/app/modules/_user_privilege_loader.js:ro
      - ./custom/logo.png:/app/static/self/logo.png:ro
      - ./custom/views/footer.ejs:/app/views/footer.ejs:ro
